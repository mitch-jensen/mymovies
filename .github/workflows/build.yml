name: Build

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Generate OpenAPI spec for the frontend build
        run: go run ./cmd/openapi > frontend/openapi.yaml

      - name: Login to Docker Hardened Images repository
        uses: docker/login-action@v4.2.0
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build
        uses: docker/bake-action@v7.2.0
        with:
          source: .
          push: false
