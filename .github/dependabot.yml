version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "frontend"
    schedule:
      interval: "daily"
  - package-ecosystem: "npm"
    directory: "frontend"
    schedule:
      interval: "daily"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
