version: "2"
linters:
  default: all
  exclusions:
    generated: lax
  disable:
    - wsl
    - gomodguard
    - exhaustruct
  settings:
    depguard:
      rules:
        Main:
          files:
            - $all
            - "!$test"
          allow:
            - $gostd
            - github.com/jackc/pgx/v5$
            - github.com/jackc/pgx/v5/pgtype$
            - github.com/jackc/pgx/v5/pgxpool$
            - github.com/danielgtaylor/huma/v2$
            - github.com/danielgtaylor/huma/v2/adapters/humachi$
            - github.com/go-chi/chi/v5$
            - github.com/go-chi/chi/v5/middleware$
            - github.com/spf13/viper$
            - github.com/mitch-jensen/mymovies/dbstore$
            - github.com/mitch-jensen/mymovies/internal/api$
            - github.com/mitch-jensen/mymovies/internal/config$
          deny:
            - pkg: reflect$
              desc: Please don't use reflect package
        Test:
          files:
            - $test
          allow:
            - $gostd
            - github.com/jackc/pgx/v5$
            - github.com/jackc/pgx/v5/pgtype$
            - github.com/jackc/pgx/v5/pgxpool$
            - github.com/jackc/pgx/v5/stdlib$
            - github.com/mitch-jensen/mymovies/dbstore$
            - github.com/mitch-jensen/mymovies/ptr$
            - github.com/pressly/goose/v3$
            - github.com/testcontainers/testcontainers-go$
            - github.com/testcontainers/testcontainers-go/modules/postgres$
          deny:
            - pkg: reflect$
              desc: Please don't use reflect package
            - pkg: github.com/stretchr/testify
              desc: Please don't use testify package
formatters:
  exclusions:
    generated: lax
output:
  format:
    json:
      path: stdout
