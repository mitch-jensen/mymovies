components:
  schemas:
    Bookcase:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/Bookcase.json
          format: uri
          readOnly: true
          type: string
        createdAt:
          format: date-time
          type: string
        id:
          type: string
        name:
          type: string
        position:
          format: int32
          type: integer
      required:
        - id
        - name
        - position
        - createdAt
      type: object
    BookcaseFields:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/BookcaseFields.json
          format: uri
          readOnly: true
          type: string
        name:
          type: string
        position:
          format: int32
          type: integer
      required:
        - name
        - position
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    LocatedRelease:
      additionalProperties: false
      properties:
        location:
          $ref: "#/components/schemas/Location"
        release:
          $ref: "#/components/schemas/Release"
      required:
        - release
        - location
      type: object
    Location:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/Location.json
          format: uri
          readOnly: true
          type: string
        bookcase:
          $ref: "#/components/schemas/Bookcase"
        placement:
          $ref: "#/components/schemas/Placement"
        shelf:
          $ref: "#/components/schemas/Shelf"
      required:
        - bookcase
        - shelf
        - placement
      type: object
    Movie:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/Movie.json
          format: uri
          readOnly: true
          type: string
        id:
          type: string
        releaseYear:
          format: int32
          type: integer
        runtimeMin:
          format: int32
          type: integer
        title:
          type: string
      required:
        - id
        - title
        - releaseYear
      type: object
    MovieFields:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/MovieFields.json
          format: uri
          readOnly: true
          type: string
        releaseYear:
          format: int32
          type: integer
        runtimeMin:
          format: int32
          type: integer
        title:
          type: string
      required:
        - title
        - releaseYear
      type: object
    Placement:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/Placement.json
          format: uri
          readOnly: true
          type: string
        createdAt:
          format: date-time
          type: string
        id:
          type: string
        position:
          format: int32
          type: integer
        releaseId:
          type: string
        shelfId:
          type: string
      required:
        - id
        - releaseId
        - shelfId
        - position
        - createdAt
      type: object
    PlacementFields:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/PlacementFields.json
          format: uri
          readOnly: true
          type: string
        position:
          format: int32
          type: integer
        shelfId:
          type: string
      required:
        - shelfId
        - position
      type: object
    Release:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/Release.json
          format: uri
          readOnly: true
          type: string
        asin:
          type: string
        bluRayDiscs:
          format: int32
          type: integer
        casing:
          type: string
        comment:
          type: string
        countryCode:
          type: string
        createdAt:
          format: date-time
          type: string
        digitalCopy:
          type: boolean
        dvdDiscs:
          format: int32
          type: integer
        ean:
          type: string
        id:
          type: string
        movieId:
          type: string
        price:
          type: string
        priceComment:
          type: string
        releaseDate:
          format: date-time
          type: string
        retailer:
          type: string
        slipcover:
          type: boolean
        studio:
          type: string
        upc:
          type: string
        watched:
          type: boolean
      required:
        - id
        - movieId
        - digitalCopy
        - createdAt
        - watched
      type: object
    ReleaseFields:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ReleaseFields.json
          format: uri
          readOnly: true
          type: string
        asin:
          type: string
        bluRayDiscs:
          format: int32
          type: integer
        casing:
          type: string
        comment:
          type: string
        countryCode:
          type: string
        digitalCopy:
          type: boolean
        dvdDiscs:
          format: int32
          type: integer
        ean:
          type: string
        price:
          type: string
        priceComment:
          type: string
        releaseDate:
          format: date-time
          type: string
        retailer:
          type: string
        slipcover:
          type: boolean
        studio:
          type: string
        upc:
          type: string
        watched:
          type: boolean
      required:
        - digitalCopy
        - watched
      type: object
    SearchResult:
      additionalProperties: false
      properties:
        locatedReleases:
          items:
            $ref: "#/components/schemas/LocatedRelease"
          type:
            - array
            - "null"
        movie:
          $ref: "#/components/schemas/Movie"
      required:
        - movie
        - locatedReleases
      type: object
    Shelf:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/Shelf.json
          format: uri
          readOnly: true
          type: string
        bookcaseId:
          type: string
        createdAt:
          format: date-time
          type: string
        id:
          type: string
        position:
          format: int32
          type: integer
      required:
        - id
        - bookcaseId
        - position
        - createdAt
      type: object
    ShelfFields:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ShelfFields.json
          format: uri
          readOnly: true
          type: string
        position:
          format: int32
          type: integer
      required:
        - position
      type: object
info:
  title: My Movies API
  version: 1.0.0
openapi: 3.1.0
paths:
  /bookcases:
    get:
      operationId: list-bookcases
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Bookcase"
                type:
                  - array
                  - "null"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List all bookcases
    post:
      operationId: create-bookcase
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookcaseFields"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bookcase"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a bookcase
  /bookcases/{bookcaseId}/shelves:
    get:
      operationId: list-bookcase-shelves
      parameters:
        - description: Bookcase ID
          in: path
          name: bookcaseId
          required: true
          schema:
            description: Bookcase ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Shelf"
                type:
                  - array
                  - "null"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List the shelves of a bookcase
    post:
      operationId: create-shelf
      parameters:
        - description: Bookcase ID
          in: path
          name: bookcaseId
          required: true
          schema:
            description: Bookcase ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShelfFields"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shelf"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Add a shelf to a bookcase
  /bookcases/{id}:
    delete:
      operationId: delete-bookcase
      parameters:
        - description: Bookcase ID
          in: path
          name: id
          required: true
          schema:
            description: Bookcase ID
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a bookcase
    get:
      operationId: get-bookcase
      parameters:
        - description: Bookcase ID
          in: path
          name: id
          required: true
          schema:
            description: Bookcase ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bookcase"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a bookcase by ID
    put:
      operationId: update-bookcase
      parameters:
        - description: Bookcase ID
          in: path
          name: id
          required: true
          schema:
            description: Bookcase ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookcaseFields"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bookcase"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a bookcase
  /movies:
    get:
      operationId: list-movies
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Movie"
                type:
                  - array
                  - "null"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List all movies
    post:
      operationId: create-movie
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieFields"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a movie
  /movies/{id}:
    delete:
      operationId: delete-movie
      parameters:
        - description: Movie ID
          in: path
          name: id
          required: true
          schema:
            description: Movie ID
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a movie
    get:
      operationId: get-movie
      parameters:
        - description: Movie ID
          in: path
          name: id
          required: true
          schema:
            description: Movie ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a movie by ID
    put:
      operationId: update-movie
      parameters:
        - description: Movie ID
          in: path
          name: id
          required: true
          schema:
            description: Movie ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieFields"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a movie
  /movies/{movieId}/releases:
    get:
      operationId: list-movie-releases
      parameters:
        - description: Movie ID
          in: path
          name: movieId
          required: true
          schema:
            description: Movie ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Release"
                type:
                  - array
                  - "null"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List the home video releases of a movie
    post:
      operationId: create-release
      parameters:
        - description: Movie ID
          in: path
          name: movieId
          required: true
          schema:
            description: Movie ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseFields"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Add a home video release to a movie
  /releases/{id}:
    delete:
      operationId: delete-release
      parameters:
        - description: Release ID
          in: path
          name: id
          required: true
          schema:
            description: Release ID
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a home video release
    get:
      operationId: get-release
      parameters:
        - description: Release ID
          in: path
          name: id
          required: true
          schema:
            description: Release ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a home video release by ID
    put:
      operationId: update-release
      parameters:
        - description: Release ID
          in: path
          name: id
          required: true
          schema:
            description: Release ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseFields"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a home video release
  /releases/{id}/location:
    get:
      operationId: locate-release
      parameters:
        - description: Release ID
          in: path
          name: id
          required: true
          schema:
            description: Release ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Find where a release physically lives
  /releases/{id}/placement:
    delete:
      operationId: remove-placement
      parameters:
        - description: Release ID
          in: path
          name: id
          required: true
          schema:
            description: Release ID
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Remove a release from its shelf
    put:
      operationId: place-release
      parameters:
        - description: Release ID
          in: path
          name: id
          required: true
          schema:
            description: Release ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlacementFields"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Placement"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Place or move a release onto a shelf
  /search:
    get:
      operationId: search-movies
      parameters:
        - description: Case-insensitive fuzzy title search
          explode: false
          in: query
          name: q
          schema:
            description: Case-insensitive fuzzy title search
            type: string
        - description: Maximum number of results
          explode: false
          in: query
          name: limit
          schema:
            default: 20
            description: Maximum number of results
            format: int64
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SearchResult"
                type:
                  - array
                  - "null"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Fuzzy-search movies by title, with each copy's physical location
  /shelves/{id}:
    delete:
      operationId: delete-shelf
      parameters:
        - description: Shelf ID
          in: path
          name: id
          required: true
          schema:
            description: Shelf ID
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a shelf
    put:
      operationId: update-shelf
      parameters:
        - description: Shelf ID
          in: path
          name: id
          required: true
          schema:
            description: Shelf ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShelfFields"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shelf"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a shelf
