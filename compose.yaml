services:
  db:
    image: dhi.io/postgres:18-alpine3.22-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/18/docker:rw
    ports:
      - 127.0.0.1:5432:5432
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: docker.io/library/adminer:5.4.2
    ports:
      - 127.0.0.1:8081:8080

volumes:
  db_data:
