services:
  db:
    image: dhi.io/postgres:18-alpine3.22-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/18/docker:rw
    ports:
      - 5432:5432

  adminer:
    image: docker.io/library/adminer:5.4.2
    ports:
      - 8081:8080

  whodb:
    image: docker.io/clidey/whodb:0.95.0
    ports:
      - 8082:8080

volumes:
  db_data:
